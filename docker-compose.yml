services:
  postgres:
    image: postgres:16-alpine
    container_name: osnova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-osnova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osnova}
      POSTGRES_DB: ${POSTGRES_DB:-osnova}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
